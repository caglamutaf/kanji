<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>500 Temel Kanji</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@300;400;700&family=Noto+Sans+JP:wght@300;400;500&family=DM+Mono:wght@300;400&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #1a1410;
    --paper: #f5f0e8;
    --cream: #ede8dc;
    --red: #c0392b;
    --gold: #b8860b;
    --muted: #8a7f72;
    --border: #d4c9b8;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: var(--paper); color: var(--ink); font-family: 'Noto Sans JP', sans-serif; min-height: 100vh; }

  /* HEADER */
  header { background: var(--ink); color: var(--paper); padding: 1.2rem 1.5rem; position: sticky; top: 0; z-index: 100; border-bottom: 3px solid var(--red); }
  .header-inner { max-width: 1400px; margin: 0 auto; display: flex; align-items: flex-end; gap: 1.2rem; flex-wrap: wrap; }
  .title-block h1 { font-family: 'Noto Serif JP', serif; font-size: 1.6rem; font-weight: 700; letter-spacing: 0.05em; }
  .title-block .subtitle { font-size: 0.68rem; color: var(--muted); letter-spacing: 0.15em; text-transform: uppercase; margin-top: 0.15rem; font-family: 'DM Mono', monospace; }
  .controls { display: flex; gap: 0.6rem; flex-wrap: wrap; flex: 1; align-items: center; }
  input[type="text"] { background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.2); color: var(--paper); padding: 0.45rem 0.9rem; font-size: 0.85rem; font-family: 'Noto Sans JP', sans-serif; border-radius: 2px; outline: none; width: 180px; transition: border 0.2s; }
  input[type="text"]::placeholder { color: rgba(255,255,255,0.35); }
  input[type="text"]:focus { border-color: var(--red); }
  select { background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.2); color: var(--paper); padding: 0.45rem 0.7rem; font-size: 0.82rem; font-family: 'DM Mono', monospace; border-radius: 2px; outline: none; cursor: pointer; }
  select option { background: #2a2420; }
  .count-badge { font-family: 'DM Mono', monospace; font-size: 0.72rem; color: var(--muted); margin-left: auto; white-space: nowrap; }
  .count-badge span { color: var(--red); font-size: 0.95rem; }
  .view-toggle { display: flex; gap: 0.3rem; }
  .view-btn { background: transparent; border: 1px solid rgba(255,255,255,0.2); color: rgba(255,255,255,0.5); padding: 0.38rem 0.65rem; cursor: pointer; font-size: 0.72rem; border-radius: 2px; transition: all 0.2s; font-family: 'DM Mono', monospace; }
  .view-btn.active { background: var(--red); border-color: var(--red); color: white; }

  /* MAIN */
  main { max-width: 1400px; margin: 0 auto; padding: 1.5rem 1.5rem 4rem; }

  /* GRID */
  .grid-view { display: none; grid-template-columns: repeat(auto-fill, minmax(190px, 1fr)); gap: 1px; background: var(--border); border: 1px solid var(--border); }
  .grid-view.active { display: grid; }
  .kanji-card { background: var(--paper); padding: 1.1rem 1rem 1rem; cursor: pointer; transition: background 0.15s; position: relative; }
  .kanji-card:hover { background: var(--cream); }
  .kanji-card .num { position: absolute; top: 0.5rem; right: 0.6rem; font-family: 'DM Mono', monospace; font-size: 0.62rem; color: var(--muted); }
  .kanji-card .kanji-char { font-family: 'Noto Serif JP', serif; font-size: 2.6rem; line-height: 1; margin-bottom: 0.35rem; color: var(--ink); }
  .kanji-card .readings { font-family: 'DM Mono', monospace; font-size: 0.62rem; color: var(--red); letter-spacing: 0.05em; margin-bottom: 0.25rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .kanji-card .meaning { font-size: 0.73rem; color: var(--ink); font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .kanji-card .example { font-family: 'Noto Serif JP', serif; font-size: 0.68rem; color: var(--muted); margin-top: 0.35rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

  /* LIST */
  .list-view { display: none; }
  .list-view.active { display: block; }
  .list-header { display: grid; grid-template-columns: 46px 70px 115px 170px 1fr; gap: 0.9rem; padding: 0.55rem 0.9rem; background: var(--ink); color: var(--paper); font-family: 'DM Mono', monospace; font-size: 0.67rem; letter-spacing: 0.1em; text-transform: uppercase; border-bottom: 2px solid var(--red); }
  .list-row { display: grid; grid-template-columns: 46px 70px 115px 170px 1fr; gap: 0.9rem; padding: 0.65rem 0.9rem; border-bottom: 1px solid var(--border); align-items: center; cursor: pointer; transition: background 0.1s; }
  .list-row:hover { background: var(--cream); }
  .list-row .n { font-family: 'DM Mono', monospace; font-size: 0.68rem; color: var(--muted); }
  .list-row .k { font-family: 'Noto Serif JP', serif; font-size: 1.9rem; }
  .list-row .r { font-family: 'DM Mono', monospace; font-size: 0.68rem; color: var(--red); }
  .list-row .m { font-size: 0.8rem; font-weight: 500; }
  .list-row .e { font-family: 'Noto Serif JP', serif; font-size: 0.77rem; color: var(--muted); }

  /* MODAL */
  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(26,20,16,0.75); z-index: 200; align-items: center; justify-content: center; }
  .modal-overlay.open { display: flex; }
  .modal { background: var(--paper); border: 1px solid var(--border); border-top: 4px solid var(--red); max-width: 520px; width: 90%; padding: 2rem; position: relative; max-height: 90vh; overflow-y: auto; }
  .modal-close { position: absolute; top: 1rem; right: 1rem; background: none; border: none; font-size: 1.2rem; cursor: pointer; color: var(--muted); font-family: 'DM Mono', monospace; padding: 0.2rem 0.5rem; }
  .modal-close:hover { color: var(--red); }
  .modal-num { font-family: 'DM Mono', monospace; font-size: 0.7rem; color: var(--muted); letter-spacing: 0.1em; margin-bottom: 0.5rem; }
  .modal-kanji { font-family: 'Noto Serif JP', serif; font-size: 6rem; line-height: 1; color: var(--ink); margin-bottom: 1rem; }
  .modal-meaning { font-size: 1.2rem; font-weight: 700; color: var(--ink); margin-bottom: 1.2rem; font-family: 'Playfair Display', serif; }
  .reading-section { margin-bottom: 1rem; }
  .reading-label { font-family: 'DM Mono', monospace; font-size: 0.65rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 0.3rem; }
  .reading-pills { display: flex; gap: 0.4rem; flex-wrap: wrap; }
  .pill { background: var(--cream); border: 1px solid var(--border); padding: 0.25rem 0.6rem; font-family: 'DM Mono', monospace; font-size: 0.8rem; border-radius: 2px; color: var(--red); }
  .pill.kun { color: #1a6b3c; background: #eef7f1; border-color: #c8e6d4; }
  .examples-section { margin-top: 1.2rem; border-top: 1px solid var(--border); padding-top: 1rem; }
  .examples-label { font-family: 'DM Mono', monospace; font-size: 0.65rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 0.6rem; }
  .example-item { display: flex; align-items: baseline; gap: 0.75rem; margin-bottom: 0.6rem; padding-bottom: 0.6rem; border-bottom: 1px dashed var(--border); }
  .example-item:last-child { border-bottom: none; }
  .ex-word { font-family: 'Noto Serif JP', serif; font-size: 1.2rem; min-width: 80px; }
  .ex-read { font-family: 'DM Mono', monospace; font-size: 0.72rem; color: var(--red); min-width: 80px; }
  .ex-mean { font-size: 0.8rem; color: var(--muted); }

  /* NO RESULTS */
  .no-results { text-align: center; padding: 4rem 2rem; color: var(--muted); font-family: 'Noto Serif JP', serif; font-size: 1.1rem; display: none; }
  .no-results .big { font-size: 3rem; margin-bottom: 1rem; }

  /* ── FLASHCARD ── */
  .flash-view {
    display: none; flex-direction: column; align-items: center;
    padding: 1rem 1rem 2rem;
    /* Fixed height so nothing scrolls */
    height: calc(100vh - 80px);
    overflow: hidden;
    justify-content: flex-start;
  }
  .flash-view.active { display: flex; }

  .flash-topbar { width: 100%; max-width: 480px; display: flex; align-items: center; gap: 0.8rem; margin-bottom: 1rem; flex-shrink: 0; }
  .flash-count { font-family: 'DM Mono', monospace; font-size: 0.7rem; color: var(--muted); white-space: nowrap; }
  .flash-pbar { flex: 1; height: 3px; background: var(--border); border-radius: 2px; overflow: hidden; }
  .flash-pfill { height: 100%; background: var(--red); border-radius: 2px; transition: width 0.4s ease; width: 0%; }
  .flash-jlpt-sel { font-family: 'DM Mono', monospace; font-size: 0.72rem; background: transparent; border: 1px solid var(--border); color: var(--muted); padding: 0.2rem 0.4rem; border-radius: 2px; cursor: pointer; }
  .flash-jlpt-sel option { background: var(--paper); }

  /* 3D FLIP CARD */
  .fc-scene {
    width: 100%; max-width: 480px;
    flex-shrink: 0;
    perspective: 1000px;
  }
  .fc-flipper {
    position: relative;
    width: 100%; height: 340px;
    transform-style: preserve-3d;
    transition: transform 0.55s cubic-bezier(.4,0,.2,1);
    cursor: pointer;
  }
  .fc-flipper.flipped { transform: rotateY(180deg); }
  /* slide out/in animations for next card */
  .fc-flipper.exit-left { transform: translateX(-130%) rotateY(0deg); opacity: 0; transition: transform 0.3s ease, opacity 0.25s; }
  .fc-flipper.enter-right { transform: translateX(110%) rotateY(0deg); opacity: 0; transition: none; }

  .fc-face {
    position: absolute; inset: 0;
    backface-visibility: hidden;
    -webkit-backface-visibility: hidden;
    border-radius: 6px;
    box-shadow: 0 4px 24px rgba(26,20,16,0.10);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    padding: 1.5rem;
    overflow: hidden;
  }
  .fc-front {
    background: var(--paper);
    border: 1px solid var(--border);
    border-top: 4px solid var(--red);
  }
  .fc-back {
    background: var(--cream);
    border: 1px solid var(--border);
    border-top: 4px solid var(--ink);
    transform: rotateY(180deg);
    justify-content: flex-start;
    overflow-y: auto;
    padding: 1.2rem 1.4rem;
    /* scrollable only on back face */
    -webkit-overflow-scrolling: touch;
  }

  .flash-badge { font-family: 'DM Mono', monospace; font-size: 0.6rem; letter-spacing: 0.12em; color: var(--muted); border: 1px solid var(--border); padding: 0.1rem 0.4rem; border-radius: 2px; position: absolute; top: 0.9rem; left: 0.9rem; }
  .flash-num   { font-family: 'DM Mono', monospace; font-size: 0.6rem; color: var(--muted); position: absolute; top: 0.9rem; right: 0.9rem; }
  .flash-tap-hint { font-family: 'DM Mono', monospace; font-size: 0.6rem; color: var(--muted); position: absolute; bottom: 0.9rem; opacity: 0.5; letter-spacing: 0.06em; }

  .flash-kanji { font-family: 'Noto Serif JP', serif; font-size: 8.5rem; line-height: 1; color: var(--ink); text-align: center; }

  /* BACK FACE content */
  .fc-back-top { width: 100%; display: flex; align-items: center; justify-content: space-between; margin-bottom: 0.8rem; flex-shrink: 0; }
  .fc-back-result { display: inline-flex; align-items: center; gap: 0.35rem; font-family: 'DM Mono', monospace; font-size: 0.72rem; padding: 0.22rem 0.6rem; border-radius: 2px; }
  .fc-back-result.correct { background: #eef7f1; color: #1a6b3c; border: 1px solid #c8e6d4; }
  .fc-back-result.wrong   { background: #fde8e8; color: #c0392b; border: 1px solid #f5c6c6; }
  .fc-back-result.neutral { background: var(--paper); color: var(--muted); border: 1px solid var(--border); }
  .fc-flip-back-btn { font-family: 'DM Mono', monospace; font-size: 0.62rem; color: var(--muted); background: none; border: 1px solid var(--border); padding: 0.2rem 0.5rem; border-radius: 2px; cursor: pointer; }

  .fc-user-ans { font-family: 'DM Mono', monospace; font-size: 0.72rem; color: var(--muted); margin-bottom: 0.6rem; width: 100%; }
  .fc-ans-meaning { font-family: 'Playfair Display', serif; font-size: 1.5rem; color: var(--ink); margin-bottom: 0.7rem; width: 100%; }
  .fc-ans-pills { display: flex; gap: 0.35rem; flex-wrap: wrap; margin-bottom: 0.8rem; width: 100%; }
  .fc-ans-exlabel { font-family: 'DM Mono', monospace; font-size: 0.58rem; color: var(--muted); letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 0.45rem; border-top: 1px dashed var(--border); padding-top: 0.7rem; width: 100%; }
  .fc-ans-ex { display: flex; gap: 0.6rem; align-items: baseline; margin-bottom: 0.4rem; width: 100%; }
  .fc-ans-ex .ew { font-family: 'Noto Serif JP', serif; font-size: 1rem; min-width: 65px; }
  .fc-ans-ex .er { font-family: 'DM Mono', monospace; font-size: 0.65rem; color: var(--red); min-width: 70px; }
  .fc-ans-ex .em { font-size: 0.72rem; color: var(--muted); }

  /* INPUT ROW */
  .flash-input-row { width: 100%; max-width: 480px; display: flex; gap: 0.5rem; margin-top: 0.8rem; flex-shrink: 0; }
  .flash-input-row input {
    flex: 1; background: var(--paper); border: 1px solid var(--border);
    border-bottom: 2px solid var(--ink); color: var(--ink);
    padding: 0.7rem 1rem; font-size: 1rem; font-family: 'Noto Sans JP', sans-serif;
    border-radius: 2px; outline: none; transition: border-color 0.2s, background 0.2s;
  }
  .flash-input-row input:focus { border-bottom-color: var(--red); }
  .flash-input-row input.correct { border-bottom-color: #1a6b3c; background: #eef7f1; color: #1a6b3c; }
  .flash-input-row input.wrong   { border-bottom-color: var(--red); background: #fde8e8; color: var(--red); }
  .flash-show-btn {
    background: var(--ink); color: var(--paper); border: none;
    padding: 0.7rem 1rem; font-family: 'DM Mono', monospace;
    font-size: 0.72rem; letter-spacing: 0.08em; cursor: pointer;
    border-radius: 2px; white-space: nowrap; flex-shrink: 0; transition: background 0.15s;
  }
  .flash-show-btn:active { background: var(--red); }

  /* NEXT BUTTON ROW */
  .flash-next-row { width: 100%; max-width: 480px; display: none; margin-top: 0.6rem; flex-shrink: 0; }
  .flash-next-row.visible { display: flex; gap: 0.5rem; }
  .flash-next-btn {
    flex: 1; background: var(--ink); color: var(--paper); border: none;
    padding: 0.8rem; font-family: 'DM Mono', monospace; font-size: 0.8rem;
    letter-spacing: 0.08em; cursor: pointer; border-radius: 2px;
    transition: background 0.15s;
  }
  .flash-next-btn:active { background: var(--red); }
  .flash-hint-row { font-family: 'DM Mono', monospace; font-size: 0.6rem; color: var(--muted); margin-top: 0.4rem; text-align: center; opacity: 0.6; flex-shrink: 0; }

  /* SCORE */
  .flash-score { width: 100%; max-width: 480px; text-align: center; padding: 2rem 1.5rem; display: none; flex-shrink: 0; }
  .flash-score.open { display: block; }
  .flash-score-big { font-family: 'Noto Serif JP', serif; font-size: 4.5rem; margin-bottom: 0.5rem; }
  .flash-score-title { font-family: 'Playfair Display', serif; font-size: 1.4rem; margin-bottom: 0.4rem; }
  .flash-score-sub { font-family: 'DM Mono', monospace; font-size: 0.73rem; color: var(--muted); margin-bottom: 1.8rem; }
  .flash-score-nums { display: flex; justify-content: center; gap: 2.5rem; margin-bottom: 1.8rem; }
  .sn { text-align: center; }
  .sn-val { font-family: 'DM Mono', monospace; font-size: 2rem; font-weight: bold; }
  .sn-val.w { color: #c0392b; } .sn-val.g { color: #1a6b3c; }
  .sn-label { font-family: 'DM Mono', monospace; font-size: 0.6rem; color: var(--muted); margin-top: 0.2rem; }
  .flash-restart { background: var(--red); color: white; border: none; padding: 0.85rem 2rem; font-family: 'DM Mono', monospace; font-size: 0.82rem; letter-spacing: 0.1em; cursor: pointer; border-radius: 2px; }

  @media (max-width: 700px) {
    header { padding: 0.9rem 1rem; }
    .header-inner { gap: 0.6rem; }
    main { padding: 1rem 0.75rem 3rem; }
    .list-header, .list-row { grid-template-columns: 40px 50px 95px 1fr; }
    .list-header :nth-child(5), .list-row .e { display: none; }
    .grid-view { grid-template-columns: repeat(auto-fill, minmax(145px, 1fr)); }
    .flash-kanji { font-size: 7rem; }
    input[type="text"] { width: 140px; }
  }
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <div class="title-block">
      <h1>漢字 500</h1>
      <div class="subtitle">En Sık Kullanılan 500 Kanji</div>
    </div>
    <div class="controls">
      <input type="text" id="search" placeholder="Kanji, anlam, okuyuş...">
      <select id="jlpt-filter">
        <option value="">Tüm Seviyeler</option>
        <option value="N5">JLPT N5</option>
        <option value="N4">JLPT N4</option>
        <option value="N3">JLPT N3</option>
        <option value="N2">JLPT N2</option>
        <option value="N1">JLPT N1</option>
      </select>
      <div class="view-toggle">
        <button class="view-btn" id="btn-grid" onclick="setView('grid')">▦</button>
        <button class="view-btn" id="btn-list" onclick="setView('list')">☰ Liste</button>
        <button class="view-btn" id="btn-flash" onclick="setView('flash')">⟳ Flashcard</button>
      </div>
      <div class="count-badge"><span id="shown-count">500</span> / 500</div>
    </div>
  </div>
</header>

<main>
  <div id="grid-container" class="grid-view"></div>
  <div id="list-container" class="list-view">
    <div class="list-header"><div>#</div><div>漢字</div><div>Okuyuş</div><div>Anlam</div><div>Örnek</div></div>
    <div id="list-rows"></div>
  </div>
  <div class="no-results" id="no-results"><div class="big">？</div>Sonuç bulunamadı</div>

  <!-- FLASHCARD VIEW -->
  <div id="flash-container" class="flash-view">
    <div class="flash-topbar">
      <span class="flash-count" id="fc-count">1 / 500</span>
      <div class="flash-pbar"><div class="flash-pfill" id="fc-fill"></div></div>
      <select class="flash-jlpt-sel" id="fc-jlpt" onchange="flashReset()">
        <option value="">Tüm seviyeler</option>
        <option value="N5">N5</option>
        <option value="N4">N4</option>
        <option value="N3">N3</option>
        <option value="N2">N2</option>
        <option value="N1">N1</option>
      </select>
    </div>

    <!-- 3D flip card -->
    <div class="fc-scene">
      <div class="fc-flipper" id="fc-flipper">
        <!-- FRONT: kanji -->
        <div class="fc-face fc-front" id="fc-front">
          <div class="flash-badge" id="fc-badge">N5</div>
          <div class="flash-num" id="fc-num">#1</div>
          <div class="flash-kanji" id="fc-kanji">日</div>
          <div class="flash-tap-hint">karta bas → çevir</div>
        </div>
        <!-- BACK: answer -->
        <div class="fc-face fc-back" id="fc-back">
          <div class="fc-back-top">
            <div id="fc-back-result" class="fc-back-result neutral">—</div>
            <button class="fc-flip-back-btn" onclick="fcFlipBack(event)">↩ geri çevir</button>
          </div>
          <div id="fc-user-ans" class="fc-user-ans" style="display:none"></div>
          <div class="fc-ans-meaning" id="fc-meaning"></div>
          <div class="fc-ans-pills" id="fc-pills"></div>
          <div class="fc-ans-exlabel">Sık Kullanılan Kelimeler</div>
          <div id="fc-examples"></div>
        </div>
      </div>
    </div>

    <!-- input row — shown when front is visible -->
    <div class="flash-input-row" id="fc-input-row">
      <input type="text" id="fc-answer-input" placeholder="Anlamını yaz..." autocomplete="off" autocorrect="off" spellcheck="false">
      <button class="flash-show-btn" onclick="flashReveal()">Göster</button>
    </div>

    <!-- next row — shown after reveal -->
    <div class="flash-next-row" id="fc-next-row">
      <button class="flash-next-btn" onclick="flashNext()">Sonraki → &nbsp;<span style="opacity:0.5;font-size:0.65rem">veya sağa kaydır</span></button>
    </div>

    <div class="flash-hint-row" id="fc-hint-row" style="display:none">sağa kaydırarak da geçebilirsin</div>

    <div class="flash-score" id="fc-score">
      <div class="flash-score-big">完</div>
      <div class="flash-score-title">Tur tamamlandı!</div>
      <div class="flash-score-sub" id="fc-score-sub"></div>
      <div class="flash-score-nums">
        <div class="sn"><div class="sn-val w" id="sc-w">0</div><div class="sn-label">Yanlış</div></div>
        <div class="sn"><div class="sn-val g" id="sc-g">0</div><div class="sn-label">Doğru</div></div>
      </div>
      <button class="flash-restart" onclick="flashReset()">Tekrar Başla</button>
    </div>
  </div>
</main>

<div class="modal-overlay" id="modal-overlay" onclick="closeModal(event)">
  <div class="modal" id="modal-box">
    <button class="modal-close" onclick="closeModalBtn()">✕</button>
    <div class="modal-num" id="m-num"></div>
    <div class="modal-kanji" id="m-kanji"></div>
    <div class="modal-meaning" id="m-meaning"></div>
    <div class="reading-section">
      <div class="reading-label">音読み (On'yomi)</div>
      <div class="reading-pills" id="m-on"></div>
    </div>
    <div class="reading-section">
      <div class="reading-label">訓読み (Kun'yomi)</div>
      <div class="reading-pills" id="m-kun"></div>
    </div>
    <div class="examples-section">
      <div class="examples-label">Sık Kullanılan Kelimeler</div>

let currentView = 'list';
let filteredData = [...KANJI];

// ── LIST / GRID ──
function setView(v) {
  currentView = v;
  ['grid','list','flash'].forEach(x => {
    document.getElementById(x+'-container').classList.toggle('active', v===x);
    const btn = document.getElementById('btn-'+x);
    if (btn) btn.classList.toggle('active', v===x);
  });
  const searchRow = document.getElementById('search').parentElement;
  // hide search/filter in flash mode
  document.getElementById('search').style.display = v==='flash' ? 'none' : '';
  document.getElementById('jlpt-filter').style.display = v==='flash' ? 'none' : '';
  document.getElementById('shown-count').parentElement.style.display = v==='flash' ? 'none' : '';
  if (v !== 'flash') render();
}

function filter() {
  const q = document.getElementById('search').value.toLowerCase();
  const jlpt = document.getElementById('jlpt-filter').value;
  filteredData = KANJI.filter(k => {
    const matchJlpt = !jlpt || k.jlpt === jlpt;
    if (!q) return matchJlpt;
    return matchJlpt && (
      k.k.includes(q) ||
      k.m.toLowerCase().includes(q) ||
      k.on.some(r => r.toLowerCase().includes(q)) ||
      k.kun.some(r => r.toLowerCase().includes(q)) ||
      k.ex.some(e => e.w.includes(q) || e.r.includes(q) || e.m.toLowerCase().includes(q))
    );
  });
  document.getElementById('shown-count').textContent = filteredData.length;
  render();
}

function render() {
  const noRes = document.getElementById('no-results');
  noRes.style.display = filteredData.length === 0 ? 'block' : 'none';
  if (currentView === 'grid') {
    document.getElementById('grid-container').innerHTML = filteredData.map(k => `
      <div class="kanji-card" onclick="openModal(${k.n})">
        <div class="num">#${k.n}</div>
        <div class="kanji-char">${k.k}</div>
        <div class="readings">${k.on[0]||'—'} / ${k.kun[0]||'—'}</div>
        <div class="meaning">${k.m}</div>
        <div class="example">${k.ex[0]?.w||''} ${k.ex[0]?.r ? '('+k.ex[0].r+')' : ''}</div>
      </div>`).join('');
  } else {
    document.getElementById('list-rows').innerHTML = filteredData.map(k => `
      <div class="list-row" onclick="openModal(${k.n})">
        <div class="n">${k.n}</div>
        <div class="k">${k.k}</div>
        <div class="r">${k.on.join('、')||'—'}<br><span style="color:#1a6b3c">${k.kun.join('、')||'—'}</span></div>
        <div class="m">${k.m}</div>
        <div class="e">${k.ex[0]?.w||''} ${k.ex[0]?.r ? '「'+k.ex[0].r+'」' : ''} ${k.ex[0]?.m ? '— '+k.ex[0].m : ''}</div>
      </div>`).join('');
  }
}

// ── MODAL ──
function openModal(n) {
  const k = KANJI.find(x => x.n === n);
  if (!k) return;
  document.getElementById('m-num').textContent = `#${k.n} · JLPT ${k.jlpt}`;
  document.getElementById('m-kanji').textContent = k.k;
  document.getElementById('m-meaning').textContent = k.m;
  document.getElementById('m-on').innerHTML = k.on.length ? k.on.map(r=>`<div class="pill">${r}</div>`).join('') : '<div class="pill">—</div>';
  document.getElementById('m-kun').innerHTML = k.kun.length ? k.kun.map(r=>`<div class="pill kun">${r}</div>`).join('') : '<div class="pill kun">—</div>';
  document.getElementById('m-examples').innerHTML = k.ex.filter(e=>e.w).map(e=>`
    <div class="example-item">
      <div class="ex-word">${e.w}</div><div class="ex-read">${e.r}</div><div class="ex-mean">${e.m}</div>
    </div>`).join('');
  document.getElementById('modal-overlay').classList.add('open');
}
function closeModal(e) { if (e.target.id==='modal-overlay') closeModalBtn(); }
function closeModalBtn() { document.getElementById('modal-overlay').classList.remove('open'); }
document.addEventListener('keydown', e => { if(e.key==='Escape') closeModalBtn(); });

// ── FLASHCARD ──
let fcDeck = [];
let fcIndex = 0;
let fcRevealed = false;
let fcScore = { correct:0, wrong:0 };
let fcAnimating = false;

function flashReset() {
  const jlpt = document.getElementById('fc-jlpt').value;
  fcDeck = (jlpt ? KANJI.filter(k=>k.jlpt===jlpt) : [...KANJI])
    .map(k=>({...k}))
    .sort(()=>Math.random()-0.5);
  fcIndex = 0;
  fcScore = {correct:0, wrong:0};
  fcRevealed = false;
  document.getElementById('fc-score').classList.remove('open');
  document.getElementById('fc-scene') && (document.getElementById('fc-scene').style.display = '');
  document.getElementById('fc-flipper').classList.remove('flipped','exit-left','enter-right');
  document.getElementById('fc-input-row').style.display = 'flex';
  document.getElementById('fc-next-row').classList.remove('visible');
  flashShowCard();
}

function flashShowCard() {
  if (fcIndex >= fcDeck.length) { flashFinish(); return; }
  const k = fcDeck[fcIndex];
  document.getElementById('fc-badge').textContent = k.jlpt;
  document.getElementById('fc-num').textContent = '#' + k.n;
  document.getElementById('fc-kanji').textContent = k.k;
  document.getElementById('fc-count').textContent = (fcIndex+1) + ' / ' + fcDeck.length;
  document.getElementById('fc-fill').style.width = ((fcIndex/fcDeck.length)*100)+'%';
  fcRevealed = false;
  // reset input
  const inp = document.getElementById('fc-answer-input');
  inp.value = ''; inp.className = ''; inp.disabled = false;
  // flip back to front
  document.getElementById('fc-flipper').classList.remove('flipped');
  document.getElementById('fc-input-row').style.display = 'flex';
  document.getElementById('fc-next-row').classList.remove('visible');
  // reset back face
  document.getElementById('fc-back-result').className = 'fc-back-result neutral';
  document.getElementById('fc-back-result').textContent = '—';
  document.getElementById('fc-user-ans').style.display = 'none';
}

// Tap card front to reveal (flip)
document.getElementById('fc-front').addEventListener('click', function() {
  if (!fcRevealed) flashReveal();
});

function fcFlipBack(e) {
  e.stopPropagation();
  document.getElementById('fc-flipper').classList.remove('flipped');
}

function flashReveal() {
  if (fcRevealed) return;
  fcRevealed = true;
  const k = fcDeck[fcIndex];
  const inp = document.getElementById('fc-answer-input');
  const userAnswer = inp.value.trim();

  // correctness check
  const correctVariants = k.m.toLowerCase().split(/[/,]/).map(s=>s.trim());
  const userNorm = userAnswer.toLowerCase().trim();
  const isCorrect = userAnswer !== '' && correctVariants.some(v =>
    userNorm === v || v.includes(userNorm) || userNorm.includes(v)
  );

  if (userAnswer !== '') {
    if (isCorrect) fcScore.correct++; else fcScore.wrong++;
    inp.className = isCorrect ? 'correct' : 'wrong';
  }
  inp.disabled = true;

  // back face result badge
  const badge = document.getElementById('fc-back-result');
  const userAnsEl = document.getElementById('fc-user-ans');
  if (userAnswer !== '') {
    badge.className = 'fc-back-result ' + (isCorrect ? 'correct' : 'wrong');
    badge.textContent = isCorrect ? '✓ Doğru!' : '✗ Yanlış';
    if (!isCorrect) {
      userAnsEl.style.display = 'block';
      userAnsEl.textContent = 'Senin cevabın: ' + userAnswer;
    }
  } else {
    badge.className = 'fc-back-result neutral';
    badge.textContent = 'Göster';
  }

  // fill back face
  document.getElementById('fc-meaning').textContent = k.m;
  document.getElementById('fc-pills').innerHTML =
    k.on.map(r=>`<div class="pill">${r}</div>`).join('') +
    k.kun.map(r=>`<div class="pill kun">${r}</div>`).join('');
  document.getElementById('fc-examples').innerHTML = k.ex.filter(e=>e.w).map(e=>`
    <div class="fc-ans-ex">
      <div class="ew">${e.w}</div><div class="er">${e.r}</div><div class="em">${e.m}</div>
    </div>`).join('');

  // flip card
  document.getElementById('fc-flipper').classList.add('flipped');
  document.getElementById('fc-input-row').style.display = 'none';
  document.getElementById('fc-next-row').classList.add('visible');
}

function flashNext() {
  if (fcAnimating) return;
  fcAnimating = true;
  const flipper = document.getElementById('fc-flipper');
  // slide left
  flipper.classList.add('exit-left');
  document.getElementById('fc-next-row').classList.remove('visible');
  document.getElementById('fc-input-row').style.display = 'none';
  setTimeout(()=>{
    fcIndex++;
    if (fcIndex >= fcDeck.length) { fcAnimating = false; flashFinish(); return; }
    // snap to right, remove exit, render new card
    flipper.style.transition = 'none';
    flipper.classList.remove('exit-left','flipped');
    flipper.classList.add('enter-right');
    void flipper.offsetWidth;
    flashShowCard();
    // slide in from right
    requestAnimationFrame(()=>{
      flipper.style.transition = '';
      flipper.classList.remove('enter-right');
      fcAnimating = false;
    });
  }, 300);
}

function flashFinish() {
  document.getElementById('fc-scene') && (document.getElementById('fc-scene').style.display = 'none');
  document.querySelector('.fc-scene').style.display = 'none';
  document.getElementById('fc-input-row').style.display = 'none';
  document.getElementById('fc-next-row').classList.remove('visible');
  document.getElementById('sc-w').textContent = fcScore.wrong;
  document.getElementById('sc-g').textContent = fcScore.correct;
  const total = fcDeck.length;
  const pct = Math.round((fcScore.correct / total) * 100);
  document.getElementById('fc-score-sub').textContent = total + " kartın " + pct + "%'ini doğru bildin";
  document.getElementById('fc-score').classList.add('open');
  document.getElementById('fc-fill').style.width = '100%';
}

// Enter key
document.getElementById('fc-answer-input').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') {
    if (!fcRevealed) flashReveal();
    else flashNext();
  }
});

// Swipe right to go next (after reveal)
(function(){
  let startX = 0, startY = 0;
  const scene = document.querySelector('.fc-scene');
  scene.addEventListener('touchstart', e=>{ startX=e.touches[0].clientX; startY=e.touches[0].clientY; }, {passive:true});
  scene.addEventListener('touchend', e=>{
    const dx = e.changedTouches[0].clientX - startX;
    const dy = Math.abs(e.changedTouches[0].clientY - startY);
    if (dx > 60 && dy < 60 && fcRevealed) flashNext();
  }, {passive:true});
})();

// ── EVENTS ──
document.getElementById('search').addEventListener('input', filter);
document.getElementById('jlpt-filter').addEventListener('change', filter);

// ── INIT ──
(function init(){
  flashReset();
  setView('list');
  document.getElementById('shown-count').textContent = filteredData.length;
  render();
})();
</script>
</body>
</html>
